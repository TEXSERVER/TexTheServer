<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Tex</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.login-box {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    color: white;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #00c6ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
    transform: scale(1.05);
}

.mensagem {
    margin-top: 15px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>🚀 Login Tex</h2>
    <input type="text" id="usuario" placeholder="Digite qualquer nome">
    <input type="password" id="senha" placeholder="Senha (1234)">
    <button onclick="verificar()">Entrar</button>
    <div class="mensagem" id="msg"></div>
</div>

<script>
function verificar() {
    var user = document.getElementById("usuario").value;
    var pass = document.getElementById("senha").value;

    if (user !== "" && pass === "1234") {
        document.getElementById("msg").innerHTML = "✅ Bem-vindo, " + user + "!";
        document.getElementById("msg").style.color = "lightgreen";
    } else {
        document.getElementById("msg").innerHTML = "❌ Senha incorreta!";
        document.getElementById("msg").style.color = "red";
    }
}
</script>

</body>
</html>
