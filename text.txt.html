<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Short Link Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#1c1c1c;
  padding:40px;
  border-radius:15px;
  box-shadow:0 0 25px black;
  text-align:center;
  width:350px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:6px;
  background:#00c6ff;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  background:#007bff;
}

.result{
  margin-top:15px;
  word-break:break-all;
  background:#111;
  padding:10px;
  border-radius:6px;
}
</style>
</head>
<body>

<div class="container">
<h2>🔗 Short Link Pro</h2>

<input type="text" id="longUrl" placeholder="Cole seu link aqui">

<input type="text" id="customCode" placeholder="Código personalizado (ex: meu-link)">

<button onclick="gerarLink()">Gerar Link</button>

<div class="result" id="resultado"></div>

</div>

<script>

function gerarLink(){

  const url = document.getElementById("longUrl").value;
  const code = document.getElementById("customCode").value || 
               Math.random().toString(36).substring(2,8);

  if(!url){
    alert("Coloque um link!");
    return;
  }

  const dominio = window.location.origin + "/";
  const shortLink = dominio + "?go=" + code;

  document.getElementById("resultado").innerHTML = `
  ✅ Link curto:<br>
  <b>${shortLink}</b><br><br>
  <button onclick="copiar('${shortLink}')">Copiar</button>
  `;

  localStorage.setItem(code, url);
}

function copiar(texto){
  navigator.clipboard.writeText(texto);
  alert("Copiado! ✅");
}

/* Redirecionamento */
window.onload = function(){

  const params = new URLSearchParams(window.location.search);
  const code = params.get("go");

  if(code){
    const link = localStorage.getItem(code);
    if(link){
      window.location.href = link;
    }
  }

};

</script>

</body>
</html>
