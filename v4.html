<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TexSocial PRO</title>

<style>
body{
    font-family:Arial;
    margin:0;
    padding:20px;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.profile{
    display:flex;
    align-items:center;
    gap:10px;
}

.profile img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
}

.comentario{
    background:rgba(0,0,0,0.3);
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    display:flex;
    gap:10px;
}

.comentario img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
}

input{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

button{
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:5px;
}
</style>
</head>
<body>

<div class="container">

<div class="topo">
    <div class="profile">
        <img id="fotoUser">
        <span id="usuario"></span>
    </div>
    <button onclick="sair()">Sair</button>
</div>

<h3>💬 Comentários</h3>

<input type="text" id="texto" placeholder="Escreva algo...">
<button onclick="enviar()">Enviar</button>

<div id="comentarios"></div>

</div>

<script>
if(!localStorage.getItem("usuario")){
    alert("Você não está logado!");
    window.location.href="index.html";
}

let nome=localStorage.getItem("usuario");
let foto=localStorage.getItem("foto");

document.getElementById("usuario").innerText=nome;
document.getElementById("fotoUser").src=foto;

let comentarios=JSON.parse(localStorage.getItem("comentarios"))||[];

function salvar(){
    localStorage.setItem("comentarios",JSON.stringify(comentarios));
}

function carregar(){
    let area=document.getElementById("comentarios");
    area.innerHTML="";
    comentarios.forEach(c=>{
        let div=document.createElement("div");
        div.className="comentario";
        div.innerHTML=
        "<img src='"+c.foto+"'>" +
        "<div><strong>"+c.nome+"</strong><br>"+c.texto+"</div>";
        area.appendChild(div);
    });
}

function enviar(){
    let texto=document.getElementById("texto").value;
    if(texto==""){
        alert("Escreva algo!");
        return;
    }

    comentarios.push({
        nome:nome,
        foto:foto,
        texto:texto
    });

    salvar();
    carregar();
    document.getElementById("texto").value="";
}

function sair(){
    localStorage.clear();
    window.location.href="index.html";
}

carregar();
</script>

</body>
</html>
