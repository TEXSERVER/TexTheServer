<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tex Instagram V6 🗣🔥</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.topbar{
background:#111;
padding:15px;
text-align:center;
font-weight:bold;
font-size:20px;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
padding:8px;
border:none;
border-radius:8px;
background:#ff3b5c;
color:white;
cursor:pointer;
}

.post{
background:#1c1c1c;
padding:15px;
border-radius:15px;
margin-top:15px;
}

.post img{
width:100%;
border-radius:10px;
margin-top:10px;
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.profile img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

.like{
background:#ff3b5c;
margin-top:5px;
}
</style>
</head>
<body>

<div class="topbar">
🔥 TEX INSTAGRAM V6🗣🔥🔥
</div>

<div class="container">

<h3>Perfil</h3>

<input type="text" id="nome" placeholder="Nome">
<input type="password" id="senha" placeholder="Senha">
<input type="file" id="foto" accept="image/*">
<button onclick="registrar()">Criar Conta</button>

<hr>

<h3>Login</h3>
<input type="text" id="loginNome" placeholder="Nome">
<input type="password" id="loginSenha" placeholder="Senha">
<button onclick="login()">Logar</button>

<hr>

<div id="areaSocial" style="display:none;">

<div class="profile">
<img id="fotoPerfil">
<div>
<h3 id="nomePerfil"></h3>
</div>
</div>

<h3>Criar Post</h3>
<input type="text" id="postTexto" placeholder="Escreva algo...">
<input type="file" id="postImagem" accept="image/*">
<button onclick="criarPost()">Postar</button>

<div id="feed"></div>

</div>

</div>

<script>

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let usuarioAtual = null;

function salvar(){
localStorage.setItem("usuarios",JSON.stringify(usuarios));
localStorage.setItem("posts",JSON.stringify(posts));
}

function registrar(){
let nome=document.getElementById("nome").value;
let senha=document.getElementById("senha").value;
let fotoFile=document.getElementById("foto").files[0];

if(nome==""||senha=="") return alert("Preenche tudo!");

let reader=new FileReader();
reader.onload=function(e){

usuarios.push({
nome:nome,
senha:senha,
foto:e.target.result
});

salvar();
alert("Conta criada!");
}
reader.readAsDataURL(fotoFile);
}

function login(){
let nome=document.getElementById("loginNome").value;
let senha=document.getElementById("loginSenha").value;

let user=usuarios.find(u=>u.nome==nome && u.senha==senha);

if(!user) return alert("Login errado!");

usuarioAtual=user;
document.getElementById("areaSocial").style.display="block";
document.getElementById("nomePerfil").innerText=user.nome;
document.getElementById("fotoPerfil").src=user.foto;

carregarFeed();
}

function criarPost(){
let texto=document.getElementById("postTexto").value;
let img=document.getElementById("postImagem").files[0];

if(texto=="" && !img) return alert("Escreve algo!");

if(img){
let reader=new FileReader();
reader.onload=function(e){
addPost(texto,e.target.result);
}
reader.readAsDataURL(img);
}else{
addPost(texto,null);
}
}

function addPost(texto,imagem){
posts.push({
usuario:usuarioAtual.nome,
foto:usuarioAtual.foto,
texto:texto,
imagem:imagem,
likes:0
});
salvar();
carregarFeed();
}

function carregarFeed(){
let feed=document.getElementById("feed");
feed.innerHTML="";

posts.forEach((p,index)=>{

let div=document.createElement("div");
div.className="post";

div.innerHTML=`
<div class="profile">
<img src="${p.foto}">
<strong>${p.usuario}</strong>
</div>
<p>${p.texto}</p>
${p.imagem?`<img src="${p.imagem}">`:``}
<button class="like" onclick="curtir(${index})">
❤️ ${p.likes}
</button>
`;

feed.appendChild(div);
});
}

function curtir(index){
posts[index].likes++;
salvar();
carregarFeed();
}

</script>

</body>
</html>>
