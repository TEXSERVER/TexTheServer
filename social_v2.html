<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - TexSocial</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
}

.login-box {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: #2a5298;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1e3c72;
    transform: scale(1.05);
}
</style>

</head>
<body>

<div class="login-box">
    <h2>Entrar</h2>
    <input type="text" id="nome" placeholder="Digite seu nome">
    <input type="password" id="senha" placeholder="Digite sua senha">
    <button onclick="entrar()">Login</button>
</div>

<script>
function entrar() {
    var nome = document.getElementById("nome").value;

    if(nome == "") {
        alert("Digite um nome!");
        return;
    }

    localStorage.setItem("usuario", nome);
    window.location.href = "social.html";
}
</script>

</body>
</html>
