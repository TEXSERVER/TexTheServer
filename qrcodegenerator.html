<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X QR Code Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  font-family: Arial;
  text-align: center;
  background:#000;
  color:white;
  padding:40px;
}

input{
  padding:10px;
  width:80%;
  max-width:400px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#ff0055;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

#qrcode{
  margin-top:20px;
  display:flex;
  justify-content:center;
}
</style>

</head>
<body>

<h2>X QR Code Generator</h2>

<input type="text" id="link" placeholder="Coloque seu link aqui...">
<br>
<button onclick="gerarQR()">Gerar QR</button>

<div id="qrcode"></div>

<script>

function gerarQR(){

  document.getElementById("qrcode").innerHTML = "";

  let link = document.getElementById("link").value;

  if(link.trim() === ""){
    alert("Coloque um link!");
    return;
  }

  new QRCode(document.getElementById("qrcode"), {
    text: link,
    width: 250,
    height: 250
  });

}

</script>

</body>
</html>
